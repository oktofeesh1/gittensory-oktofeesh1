name: Feature request
description: Suggest a UI, API, MCP, GitHub App, signal, docs, or operational improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests concrete. Broad redesigns, framework swaps, GitHub Pages/VitePress restoration, reward-farming features, and public private-signal exposure are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What contributor, maintainer, operator, or repo-owner problem should this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend UI
        - REST API
        - MCP
        - GitHub App
        - Auth/session
        - Cloudflare deploy/runtime
        - Registry/backfill
        - Signal logic
        - Tests/CI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, signal, UI, API shape, or operational change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would prove this is done and production-safe?
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: test_scenarios
    attributes:
      label: Test scenarios
      description: List unit/integration cases for new branches, fallback paths, sanitizer rules, and regressions. Call out public/private safety boundaries if GitHub comments or MCP output changes.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not restore GitHub Pages, VitePress, `site/`, or `CNAME`.
          required: true
        - label: This does not require storing user PATs or adding a non-GitHub identity provider.
          required: true
        - label: This does not expose wallet details, raw trust scores, private rankings, or reward estimates publicly.
          required: true
        - label: This does not auto-close, auto-merge, rewrite contributor work, or label PRs outside the confirmed-miner policy.
          required: true
        - label: Public GitHub output will be tested against forbidden language (wallet, hotkey, raw trust score, payout, reward estimate, farming, private reviewability, public score estimate).
          required: true
